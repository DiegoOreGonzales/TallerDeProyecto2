name: CI / TDD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint-backend:
    name: Lint Backend (PEP-8)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Run flake8
      run: flake8 src/backend/app/ --max-line-length=120 --count --statistics

  test-backend:
    name: Backend Tests (Pytest + Coverage)
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: scheduling_system_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r src/backend/requirements.txt
        pip install -r src/backend/requirements-dev.txt
    - name: Run Pytest with Coverage (TDD)
      env:
        DATABASE_URL: postgresql://admin:admin123@localhost:5432/scheduling_system_test
      run: |
        cd src/backend
        pytest --cov=app tests/ --cov-report=xml
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./src/backend/coverage.xml
        fail_ci_if_error: false

  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install dependencies
      run: |
        cd src/frontend
        npm install
    - name: Run ESLint
      run: |
        cd src/frontend
        npm run lint

  build-frontend:
    name: Build Frontend (TypeScript + Vite)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install dependencies
      run: |
        cd src/frontend
        npm install
    - name: TypeScript check & Vite build
      run: |
        cd src/frontend
        npm run build

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker images
      run: docker compose build
